<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LAN Messenger</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), display-capture=(self)">
</head>
<body>
    <!-- Gate Screen -->
    <div id="gateScreen" class="screen">
        <div class="panel auth-panel">
            <h1>LAN Messenger</h1>
            <p>Код доступа</p>
            <input type="password" id="gateCode" placeholder="Введите код">
            <div class="row">
                <input type="checkbox" id="rememberCode" style="width:auto;">
                <label for="rememberCode" style="margin:0;">Запомнить код на этом устройстве</label>
            </div>
            <button id="gateBtn">Продолжить</button>
            <div id="gateError" class="error"></div>
        </div>
    </div>

    <!-- Auth Screen -->
    <div id="authScreen" class="screen hidden">
        <div class="panel auth-panel">
            <div class="tabs">
                <button id="tabLogin" class="tab active">Вход</button>
                <button id="tabRegister" class="tab">Регистрация</button>
            </div>
            
            <div id="loginPane">
                <input type="text" id="loginUsername" placeholder="Username" autocapitalize="none">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
            
            <div id="registerPane" class="hidden">
                <input type="text" id="regUsername" placeholder="Username" autocapitalize="none">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regNickname" placeholder="Ник">
                <button id="registerBtn">Создать аккаунт</button>
            </div>
            
            <div id="authError" class="error"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <aside class="sidebar panel">
            <div class="profile-mini" id="profileMini"></div>
            <button id="btnMobileMenu" class="mobile-only ghost">☰ Меню</button>
            <div class="quick-tabs">
                <button id="tabChats" class="quick active">💬</button>
                <button id="tabRequests" class="quick">📥</button>
                <button id="tabSearch" class="quick">🔎</button>
                <button id="tabFriends" class="quick">👥</button>
            </div>
            
            <div id="paneChats" class="tab-pane">
                <div class="row">
                    <button id="btnCopyMyId" class="ghost">Мой ID</button>
                    <button id="btnProfile">Профиль</button>
                    <button id="btnSettings">Настройки</button>
                </div>
                <div class="row">
                    <button id="btnGroup">Новая группа</button>
                    <button id="btnFriends">Обновить</button>
                </div>
                <input type="text" id="chatSearch" placeholder="Поиск чатов...">
                <div id="chatList" class="list"></div>
            </div>
            
            <div id="paneRequests" class="tab-pane hidden">
                <h3>📥 Заявки в друзья</h3>
                <div id="friendRequests" class="list"></div>
                <h3>📨 Инвайты в группы</h3>
                <div id="groupInvites" class="list compact"></div>
            </div>
            
            <div id="paneSearch" class="tab-pane hidden">
                <h3>🔎 Поиск людей</h3>
                <input type="text" id="userSearch" placeholder="Username или ник...">
                <div id="userResults" class="list"></div>
            </div>
            
            <div id="paneFriends" class="tab-pane hidden">
                <h3>👥 Друзья</h3>
                <div id="friendsList" class="list"></div>
                <button id="btnLogout" class="danger" style="margin-top: 10px;">Выйти из аккаунта</button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area panel">
            <div class="chat-header">
                <div class="row" style="flex:1;">
                    <button id="btnBackToList" class="ghost hidden">← Назад</button>
                    <h3 id="chatTitle" style="margin:0;">Выберите чат</h3>
                </div>
                <div class="chat-controls">
                    <button id="btnCallStart">📞 Звонок</button>
                    <button id="btnInviteGroup" class="hidden">👤+</button>
                    <button id="btnLeaveChat" class="danger hidden">Выйти</button>
                    <button id="btnDeleteGroup" class="danger hidden">Удалить</button>
                </div>
            </div>
            
            <div class="chat-stack">
                <div id="groupMembersPanel" class="group-members hidden">
                    <h4>Участники</h4>
                    <div id="chatMembers"></div>
                </div>
                <div class="messages" id="messages"></div>
            </div>
            
            <div class="composer">
                <textarea id="messageInput" placeholder="Введите сообщение..."></textarea>
                <div class="composer-actions">
                    <button id="btnAssets">😀 Эмодзи</button>
                    <button id="btnFile">📎 Файл</button>
                    <button id="btnVoice">🎤 Голос</button>
                    <button id="btnCircle">📹 Кружок</button>
                    <button id="sendBtn" style="background: var(--line-accent);">➤ Отправить</button>
                </div>
                <input type="file" id="fileInput" class="hidden">
            </div>
        </main>
    </div>

    <!-- Call Overlay -->
    <div id="callOverlay" class="call-overlay hidden">
        <div class="call-shell">
            <div class="call-top">
                <h3 id="callTitleText" style="margin:0; text-shadow: 0 1px 3px rgba(0,0,0,0.8);">Звонок <span id="callTimer">00:00</span></h3>
                <button id="btnMinimizeCall" class="ghost">Свернуть ↙</button>
            </div>
            
            <div id="callGrid" class="call-grid"></div>
            
            <div class="call-actions">
                <button id="btnToggleMic">🎤 Микр: ВКЛ</button>
                <button id="btnToggleCam">📹 Камера: ВЫКЛ</button>
                <button id="btnShareScreen">💻 Демонстрация</button>
                <button id="btnDevices">⚙️ Устройства</button>
                <button id="btnLeaveCall" class="danger">Завершить</button>
            </div>
            
            <div id="devicePanel" class="device-panel hidden">
                <select id="selMic"></select>
                <select id="selCam"></select>
                <select id="selSpeaker"></select>
                <select id="selAudioMode">
                    <option value="speaker">Спикер (Громкая связь)</option>
                    <option value="phone">Телефон (Ухо)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Incoming Call Toast -->
    <div id="incomingCallToast" class="incoming hidden">
        <h3 id="incomingCallText" style="margin-top:0;">Входящий звонок</h3>
        <div class="dialog-actions">
            <button id="btnIncomingAccept" style="background: #2a8a47; border-color: #3cb05f;">Принять</button>
            <button id="btnIncomingDecline" class="danger">Отклонить</button>
        </div>
    </div>

    <button id="btnCallRestore" class="floating-call hidden">📞 Вернуться в звонок</button>

    <!-- Dialogs -->
    <dialog id="profileDialog">
        <h3>Профиль</h3>
        <input type="text" id="profileNickname" placeholder="Ник">
        <textarea id="profileAbout" placeholder="О себе"></textarea>
        <p class="small" style="margin-top:8px;">Аватар:</p>
        <input type="file" id="profileAvatar" accept="image/*">
        <div class="dialog-actions">
            <button id="profileSave">Сохранить</button>
            <button id="profileClose" class="ghost">Закрыть</button>
        </div>
    </dialog>

    <dialog id="groupDialog">
        <h3>Новая группа</h3>
        <input type="text" id="groupTitle" placeholder="Название">
        <input type="text" id="groupMembers" placeholder="ID друзей через запятую (напр. 12, 45)">
        <div class="dialog-actions">
            <button id="groupCreate">Создать</button>
            <button id="groupClose" class="ghost">Отмена</button>
        </div>
    </dialog>

    <dialog id="settingsDialog">
        <h3>Приватность и настройки</h3>
        <label class="small">Заявки в друзья</label>
        <select id="setFriendReq"><option value="everyone">Все</option><option value="friends">Только друзья</option><option value="nobody">Никто</option></select>
        <label class="small">Кто может звонить</label>
        <select id="setCalls"><option value="everyone">Все</option><option value="friends">Только друзья</option><option value="nobody">Никто</option></select>
        <label class="small">Приглашения в группы</label>
        <select id="setInvites"><option value="everyone">Все</option><option value="friends">Только друзья</option><option value="nobody">Никто</option></select>
        <label class="small">Видимость статуса</label>
        <select id="setLastSeen"><option value="everyone">Все</option><option value="friends">Только друзья</option><option value="nobody">Никто</option></select>
        
        <h4 style="margin-top:16px;">Смена пароля</h4>
        <input type="password" id="oldPassword" placeholder="Старый пароль">
        <input type="password" id="newPassword" placeholder="Новый пароль">
        <button id="btnChangePassword" class="ghost" style="border: 1px solid var(--line);">Сменить пароль</button>
        
        <h4 style="margin-top:16px;">Заблокированные</h4>
        <div id="blockedList" class="list compact"></div>
        
        <div class="dialog-actions">
            <button id="settingsSave">Сохранить</button>
            <button id="btnDeleteAccount" class="danger">Удалить аккаунт</button>
            <button id="settingsClose" class="ghost">Закрыть</button>
        </div>
    </dialog>

    <dialog id="assetsDialog">
        <h3>Мои стикеры</h3>
        <select id="assetKind"><option value="emoji">Emoji</option><option value="sticker">Sticker</option></select>
        <input type="text" id="assetTitle" placeholder="Название">
        <input type="file" id="assetFile" accept="image/*,video/*">
        <button id="btnUploadAsset" class="ghost" style="border:1px solid var(--line);">Загрузить</button>
        <div id="assetsList" class="list"></div>
        <div class="dialog-actions"><button id="assetsClose" class="ghost">Закрыть</button></div>
    </dialog>

    <script src="/static/app.js"></script>
</body>
</html>
